name: flow4-thumbnail
version: "1.0"
description: >
  Produce hook-matched thumbnails. For each chosen hook (or each short/long
  deliverable), grab the most representative frame and burn a headline, and/or
  generate a designed thumbnail with gpt-image from the hook's caption. Runs as a
  standalone flow or as the tail of flow 3.
category: thumbnail
orchestrator: oc-orchestrator
default_checkpoint_policy: guided

inputs:
  hooks: []                 # [{start,end,caption}] from hook-finder, or deliverables
  aspect: "16:9"            # 16:9 (YouTube) | 9:16 (short)
  mode: both                # frame | generate | both

stages:
  - name: thumbnails
    worker: oc-thumbnail-artist
    fanout: per_hook         # one artist per hook/deliverable, concurrently
    detail: >
      For each hook: `oc thumbnail --start S --end E --title "<headline>"` for the
      frame+title version, and/or add `--generate [--from-frame]` for the designed
      version. The artist picks a representative frame (auto, or pin with --at) and
      keeps the title legible and inside the safe area.
    tool: >
      oc thumbnail --input <VIDEO> --start <S> --end <E> --aspect <A>
      --title "<headline>" [--generate] [--from-frame] --out thumbnails/<id>.png
    produces: [thumbnails]
    checkpoint_required: true
    human_approval_default: true
    review_focus:
      - Frame is on-topic for the hook (not a transition / black frame)
      - Headline legible at small size, ≤ 3 lines, inside safe area
      - Thumbnail does not promise content the clip doesn't deliver
    success:
      - One thumbnail per hook at the right resolution (1280x720 or 1080x1920)

deliverables:
  - thumbnails/*.png
