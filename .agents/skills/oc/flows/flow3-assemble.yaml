name: flow3-assemble
version: "1.0"
description: >
  Weave multiple source videos into ONE longform, then mine that longform's
  hook moments into shorts. "Take these 5 videos, make a longform, and cut the
  hooks into shorts." Form (shorts / 10-min / longform) is chosen from the
  user's request.
category: assemble
orchestrator: oc-orchestrator
default_checkpoint_policy: guided

inputs:
  videos: []               # ordered list of source videos
  target_form: longform    # shorts | tenmin | longform
  shorts_from_hooks: true

stages:
  - name: prep
    worker: [oc-proxy-converter, oc-stt-worker]
    fanout: per_video        # proxy + ingest + parallel STT for EACH source video
    detail: >
      For each source: optionally proxy, then `oc ingest`, then fan out
      stt-workers per chunk, then transcript-merge into that video's project.
      Different source videos prep concurrently — this is the widest fan-out.
    produces: [per_video_transcripts]
    success: ["each source has a merged transcript"]

  - name: assemble_longform
    worker: oc-assembler
    fanout: 1
    detail: >
      Order the sources (user order, or by narrative if asked). Optionally
      cut-edit each via flow1's cut_debate before joining. Then concat.
    tool: "oc --project <P> concat --inputs v1.mp4 v2.mp4 ... --out out/longform.mp4"
    produces: [longform]
    checkpoint_required: true
    human_approval_default: true
    success: ["longform plays end-to-end; transitions between sources are clean"]
    review_focus:
      - Source order serves the story
      - No abrupt audio jumps at joins (concat normalizes, but verify)

  - name: find_hooks
    worker: oc-hook-finder
    fanout: per_section      # scan the longform transcript timeline in parallel
    detail: >
      Build a combined transcript for the longform (offset each source's
      transcript by its position). Fan out hook-finders across sections; each
      returns ranked {start,end,strength,caption}. Dedup, keep top-K.
    produces: [hook_candidates]
    checkpoint_required: true
    human_approval_default: true
    success: ["K standalone hooks, each 15-60s, snapped to sentence boundaries"]

  - name: render_shorts
    worker: [oc-assembler, oc-subtitle-agent, oc-thumbnail-artist]
    fanout: per_short        # render + caption + thumbnail per chosen hook
    detail: >
      For each hook: `oc clip --aspect 9:16`, subtitle-agent makes a clip-relative
      SRT and burns it (`--burn-srt`), and thumbnail-artist makes a hook-matched
      thumbnail (`oc thumbnail ... --title "<caption>"`, optionally `--generate`).
      All three run concurrently per short.
    produces: [shorts, thumbnails]
    success:
      - Each short is 1080x1920, 15-60s, hook in the first ~2s
      - Burned captions readable, inside the safe area
      - Each short has a hook-matched thumbnail

deliverables:
  - out/longform.mp4
  - shorts/*.mp4
  - thumbnails/*.png
