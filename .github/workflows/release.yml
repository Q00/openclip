name: release

# Publish to PyPI on every version tag (or manually for an existing tag).
# Auth: PyPI Trusted Publishing (OIDC) — register this repo+workflow as a
# (pending) publisher for the `openclip` project on pypi.org; no token secret.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to publish (e.g. v0.2.0)"
        required: true

permissions:
  contents: write   # create the GitHub release
  id-token: write   # PyPI trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref }}
      - uses: astral-sh/setup-uv@v5
      - name: Build sdist + wheel
        run: uv build
      - name: Publish to PyPI (trusted publishing)
        run: uv publish --trusted-publishing always
      - name: Create GitHub release (if missing)
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --generate-notes \
              dist/*.whl dist/*.tar.gz
