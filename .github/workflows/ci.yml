name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ffmpeg and caption fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-nanum
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Agent/skill mirrors in sync
        run: uv run python scripts/sync_agents.py --check
      - name: Tests
        run: uv run pytest -q
